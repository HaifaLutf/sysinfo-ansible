---
- name: Enforce legal security banner (MOTD) for compliance audits
  ansible.builtin.copy:
    content: "WARNING: Authorized financial systems access only. All activity is monitored."
    dest: /tmp/motd
    mode: '0644'

- name: Audit and remove legacy insecure networking utilities
  ansible.builtin.apt:
    name: "{{ item }}"
    state: absent
  loop:
    - rsh-client
    - telnet
  ignore_errors: true
