---
- name: Generate dynamic system dashboard template
  template:
    src: index.html.j2
    dest: /tmp/index_{{ ansible_hostname }}.html
    mode: '0644'

- name: Post-Deployment Verification Check (Automated Quality Gate)
  stat:
    path: /tmp/index_{{ ansible_hostname }}.html
  register: file_check

- name: Fail if verification dashboard was not generated
  fail:
    msg: "Quality Gate Failed!"
  when: not file_check.stat.exists
