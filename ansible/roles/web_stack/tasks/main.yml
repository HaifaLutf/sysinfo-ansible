---
- name: Generate dynamic system dashboard template
  ansible.builtin.template:
    src: dashboard.html.j2
    dest: /tmp/dashboard.html
    mode: '0644'

- name: Post-Deployment Verification Check (Automated Quality Gate)
  ansible.builtin.stat:
    path: /tmp/dashboard.html
  register: dashboard_status

- name: Fail if verification dashboard was not generated
  ansible.builtin.fail:
    msg: "CRITICAL COMPLIANCE FAILURE: Post-deployment dashboard is missing!"
  when: not dashboard_status.stat.exists
